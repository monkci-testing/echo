name: Run Tests
on:
  workflow_dispatch:

permissions:
  contents: read #  to fetch code (actions/checkout)

env:
  # run coverage and benchmarks only with the latest Go version
  LATEST_GO_VERSION: "1.26"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.25", "1.26"]
        runner:
          - monkci-ubuntu-24.04-4-3600iops
          - ubuntu-latest
        exclude:
          # Custom runner is Linux-only — skip for macOS and Windows os variants
          - runner: monkci-ubuntu-24.04-4-3600iops
            os: macos-latest
          - runner: monkci-ubuntu-24.04-4-3600iops
            os: windows-latest
          # Avoid duplicating ubuntu-latest os + ubuntu-latest runner (same machine)
          - runner: ubuntu-latest
            os: ubuntu-latest
    name: ${{ matrix.os == 'ubuntu-latest' && matrix.runner || matrix.os }} @ Go ${{ matrix.go }}
    runs-on: ${{ matrix.runner != 'ubuntu-latest' && matrix.runner || matrix.os }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Run Tests
        run: go test -race --coverprofile=coverage.coverprofile --covermode=atomic ./...
      - name: Upload coverage to Codecov
        # Upload only once — from the baseline ubuntu-latest runner, latest Go
        if: success() && matrix.go == env.LATEST_GO_VERSION && matrix.os == 'ubuntu-latest' && matrix.runner == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token:
          fail_ci_if_error: false

  benchmark:
    needs: test
    name: Benchmark comparison @ ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - monkci-ubuntu-24.04-4-3600iops
          - ubuntu-latest
    steps:
      - name: Checkout Code (Previous)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
          path: previous
      - name: Checkout Code (New)
        uses: actions/checkout@v4
        with:
          path: new
      - name: Set up Go ${{ env.LATEST_GO_VERSION }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.LATEST_GO_VERSION }}
      - name: Install Dependencies
        run: go install golang.org/x/perf/cmd/benchstat@latest
      - name: Run Benchmark (Previous)
        run: |
          cd previous
          go test -run="-" -bench=".*" -count=8 ./... > benchmark.txt
      - name: Run Benchmark (New)
        run: |
          cd new
          go test -run="-" -bench=".*" -count=8 ./... > benchmark.txt
      - name: Run Benchstat
        run: |
          benchstat previous/benchmark.txt new/benchmark.txt
